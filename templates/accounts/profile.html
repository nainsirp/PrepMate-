{% extends 'base.html' %}

{% block title %}Profile - PrepMate{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h2 class="text-2xl font-bold mb-6">Your Profile</h2>
    <div class="bg-white p-6 rounded-lg shadow">
        <form method="post" enctype="multipart/form-data" class="space-y-4">
            {% csrf_token %}
            <div class="flex items-center space-x-4">
                {% if user.profile_picture %}
                    <img src="{{ user.profile_picture.url }}" alt="Profile Picture" class="w-24 h-24 rounded-full object-cover">
                {% else %}
                    <div class="w-24 h-24 rounded-full bg-gray-200 flex items-center justify-center">
                        <span class="text-gray-500 text-2xl">{{ user.username|first|upper }}</span>
                    </div>
                {% endif %}
                <div>
                    <input type="file" name="profile_picture" accept="image/*" class="block text-sm text-gray-500
                        file:mr-4 file:py-2 file:px-4
                        file:rounded-full file:border-0
                        file:text-sm file:font-semibold
                        file:bg-blue-50 file:text-blue-700
                        hover:file:bg-blue-100">
                </div>
            </div>

            <div>
                <label class="block mb-1">Username</label>
                <input type="text" value="{{ user.username }}" disabled class="w-full p-2 border rounded bg-gray-50">
            </div>

            <div>
                <label class="block mb-1">Email</label>
                <input type="email" value="{{ user.email }}" disabled class="w-full p-2 border rounded bg-gray-50">
            </div>

            <div>
                <label class="block mb-1">Role</label>
                <input type="text" value="{{ user.get_role_display }}" disabled class="w-full p-2 border rounded bg-gray-50">
            </div>

            <div>
                <label class="block mb-1">Bio</label>
                <textarea name="bio" rows="4" class="w-full p-2 border rounded">{{ user.bio }}</textarea>
            </div>

            <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                Update Profile
            </button>
        </form>
    </div>
</div>
{% endblock %}
