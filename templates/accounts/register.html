{% extends 'base.html' %}

{% block title %}Register - PrepMate{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <h2 class="text-2xl font-bold mb-4">Register</h2>
    <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block">Username</label>
            <input type="text" name="username" class="w-full p-2 border rounded">
        </div>
        <div>
            <label class="block">Email</label>
            <input type="email" name="email" class="w-full p-2 border rounded">
        </div>
        <div>
            <label class="block">Password</label>
            <input type="password" name="password1" class="w-full p-2 border rounded">
        </div>
        <div>
            <label class="block">Confirm Password</label>
            <input type="password" name="password2" class="w-full p-2 border rounded">
        </div>
        <div>
            <label class="block">Role</label>
            <select name="role" class="w-full p-2 border rounded">
                <option value="student">Student</option>
                <option value="assessor">Assessor</option>
            </select>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded">Register</button>
    </form>
</div>
{% endblock %}
